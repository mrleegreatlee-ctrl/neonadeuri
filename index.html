<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>너나들이</title>
<style>
:root{--cream:#F5F1EB;--vermillion:#D97757;--beige:#E8DCC8;--brown:#3D3929;--terra:#C96342;--red:#E63946;--blue:#1D4ED8}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;height:100dvh;font-family:Helvetica,sans-serif;background:var(--cream);color:var(--brown);font-size:14px;overflow:hidden;-webkit-overflow-scrolling:touch}
#app{position:relative;width:100vw;height:100vh;height:100dvh;max-width:480px;margin:0 auto;background:var(--cream);display:flex;flex-direction:column;padding-bottom:env(safe-area-inset-bottom,0)}
header{padding:12px 16px;border-bottom:1px solid var(--beige);background:var(--cream);z-index:10}
header h1{font-family:Georgia,serif;font-size:18px}
header .sub{font-size:10px;color:var(--terra);margin-top:2px}
main{flex:1;position:relative;overflow:hidden}
.view{display:none;width:100%;height:100%;position:absolute;inset:0}.view.active{display:block}
#map{width:100%;height:100%}
.search-wrap{position:absolute;top:10px;left:10px;right:10px;z-index:500}
.search-box{background:#fff;border:1px solid var(--beige);border-radius:8px;padding:11px 14px;box-shadow:0 2px 8px rgba(61,57,41,.1)}
.search-box input{width:100%;border:none;outline:none;font-size:14px;color:var(--brown);background:transparent}
.sresults{margin-top:4px;background:#fff;border:1px solid var(--beige);border-radius:8px;max-height:240px;overflow-y:auto;display:none}
.sresults div{padding:11px 14px;border-bottom:1px solid var(--beige);font-size:13px;cursor:pointer}
.sresults .nm{font-weight:bold}.sresults .ad{font-size:11px;color:var(--terra);margin-top:2px}
.list-view{padding:14px;overflow-y:auto;height:100%}
.tabs{display:flex;gap:6px;margin-bottom:14px}
.tabs button{flex:1;padding:9px;border:1px solid var(--beige);background:#fff;font-family:Georgia,serif;font-size:13px;color:var(--brown);border-radius:8px;cursor:pointer}
.tabs button.on{background:var(--vermillion);color:#fff;border-color:var(--vermillion)}
.cal{background:#fff;border:1px solid var(--beige);border-radius:10px;padding:12px;margin-bottom:14px}
.cal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-family:Georgia,serif;font-size:13px}
.cal-head button{border:none;background:transparent;font-size:18px;cursor:pointer;color:var(--brown);padding:4px 10px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;font-size:11px}
.cal-grid .dow{text-align:center;color:var(--terra);padding:3px 0}
.cal-grid .day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:5px;cursor:pointer;position:relative}
.cal-grid .day.has::after{content:'';position:absolute;bottom:3px;width:4px;height:4px;background:var(--vermillion);border-radius:50%}
.cal-grid .day.empty{cursor:default}
.list-card{background:#fff;border:1px solid var(--beige);border-radius:10px;padding:12px;margin-bottom:10px}
.list-card .photos{display:flex;gap:5px;margin-bottom:8px;cursor:pointer}
.list-card .photos img{flex:1;aspect-ratio:1;object-fit:cover;border-radius:5px;background:var(--beige);min-width:0}
.list-card .meta{display:flex;flex-direction:column;gap:2px}
.list-card .meta .city{font-size:10px;color:var(--terra)}
.list-card .meta .place{font-family:Georgia,serif;font-size:13px;color:var(--brown)}
.list-card .meta .title{font-size:12px;color:var(--brown);opacity:.8}
.list-card .meta .date{font-size:11px;color:var(--brown);opacity:.5}
.will-card .full-addr{font-size:11px;color:var(--terra);margin-bottom:4px;line-height:1.4}
.will-card .name{font-family:Georgia,serif;font-size:14px;margin-bottom:6px}
.will-card textarea{width:100%;border:1px solid var(--beige);border-radius:6px;padding:7px;font-family:inherit;font-size:13px;background:var(--cream);color:var(--brown);resize:none;outline:none;min-height:46px}
.modal{position:fixed;inset:0;background:rgba(61,57,41,.6);display:none;align-items:center;justify-content:center;z-index:2000;padding:16px}
.modal.on{display:flex}
.modal-inner{background:var(--cream);border-radius:12px;padding:18px;width:100%;max-width:440px;max-height:80vh;overflow-y:auto}
.modal-inner h3{font-family:Georgia,serif;margin-bottom:12px;font-size:15px}
.modal-rec{margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--beige)}
.modal-rec:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.modal-rec .pname{font-family:Georgia,serif;font-size:13px;margin-bottom:4px;color:var(--vermillion)}
.modal-rec .ptitle{font-size:11px;color:var(--brown);opacity:.7;margin-bottom:6px}
.modal-rec .photos{display:flex;gap:5px}
.modal-rec .photos img{flex:1;aspect-ratio:1;object-fit:cover;border-radius:5px;background:var(--beige);min-width:0;cursor:pointer}
.detail-view{padding:16px;overflow-y:auto;height:100%}
.detail-back{background:transparent;border:none;font-family:Georgia,serif;font-size:13px;color:var(--brown);cursor:pointer;margin-bottom:14px;padding:0}
.my-view{padding:24px 20px;height:100%;overflow-y:auto}
.profile-card{background:#fff;border:1px solid var(--beige);border-radius:12px;padding:16px;display:flex;align-items:center;gap:14px;margin-bottom:18px}
.avatar{width:52px;height:52px;border-radius:50%;background:var(--vermillion);color:#fff;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;font-size:22px;flex-shrink:0;cursor:pointer}
.profile-card .pinfo{flex:1;min-width:0}
.profile-card input,.profile-card textarea{width:100%;border:none;background:transparent;font-family:Georgia,serif;color:var(--brown);outline:none}
.profile-card .pname-i{font-size:18px;border-bottom:1px dashed var(--beige);padding:2px 0}
.profile-card .pbio{font-family:Helvetica,sans-serif;font-size:11px;color:var(--terra);margin-top:5px;border-bottom:1px dashed var(--beige);padding:2px 0;resize:none}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px}
.stat{background:#fff;border:1px solid var(--beige);border-radius:8px;padding:12px;text-align:center}
.stat .num{font-family:Georgia,serif;font-size:20px;color:var(--vermillion)}.stat .lbl{font-size:10px;opacity:.7;margin-top:3px}
.menu-card{background:#fff;border:1px solid var(--beige);border-radius:8px;overflow:hidden;margin-bottom:18px}
.menu-card .item{padding:14px 16px;border-bottom:1px solid var(--beige);font-size:13px;cursor:pointer;display:flex;justify-content:space-between}
.menu-card .item:last-child{border-bottom:none}.menu-card .arrow{color:var(--terra)}
.version{text-align:center;font-size:10px;opacity:.4;font-family:Georgia,serif}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--brown);color:#fff;padding:10px 20px;border-radius:8px;font-size:12px;z-index:3000;display:none}.toast.on{display:block}
nav{height:60px;background:#fff;border-top:1px solid var(--beige);display:flex;z-index:10}
nav button{flex:1;border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--brown);font-family:Georgia,serif;font-size:10px;opacity:.5}
nav button.active{opacity:1;color:var(--vermillion)}
nav button svg{width:22px;height:22px}
.sheet{position:fixed;left:0;right:0;bottom:0;background:var(--cream);border-radius:16px 16px 0 0;padding:18px;max-height:80vh;height:auto;overflow-y:auto;box-shadow:0 -4px 16px rgba(61,57,41,.25);z-index:1500;transform:translateY(100%);transition:transform .3s;max-width:480px;margin:0 auto;padding-bottom:env(safe-area-inset-bottom,18px)}
.sheet.on{transform:translateY(0)}
.sheet h3{font-family:Georgia,serif;font-size:16px;margin-bottom:4px}
.sheet .place{font-size:11px;color:var(--terra);margin-bottom:14px}
.cat-row{display:flex;gap:6px;margin-bottom:12px}
.cat-row button{flex:1;padding:10px;border:2px solid var(--brown);background:#fff;color:var(--brown);font-family:Georgia,serif;font-size:13px;border-radius:8px;cursor:pointer}
.cat-row button.on-go{background:var(--blue);color:#fff;border-color:var(--blue)}
.cat-row button.on-will{background:var(--red);color:#fff;border-color:var(--red)}
.photo-slots{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
.photo-slots.hide{display:none}
.photo-slot{aspect-ratio:1;background:#fff;border:1px dashed var(--brown);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;overflow:hidden;position:relative;transition:all .2s ease;color:var(--vermillion)}
.photo-slot:active{transform:scale(0.96);background:var(--cream)}
.photo-slot img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;animation:photoFadeIn .35s ease-out}
@keyframes photoFadeIn{from{opacity:0;transform:scale(1.05)}to{opacity:1;transform:scale(1)}}
.sheet{transition:transform .35s cubic-bezier(.32,.72,.4,1)}
.form-input{width:100%;padding:9px 11px;border:1px solid var(--beige);border-radius:7px;font-family:inherit;font-size:13px;background:#fff;color:var(--brown);outline:none;margin-bottom:12px}
textarea#memo{min-height:70px;resize:none}
#dateBox{margin-bottom:12px}#dateBox label{display:block;font-size:11px;color:var(--terra);margin-bottom:5px}
#recDate{width:100%;padding:11px 14px;border:1px solid var(--beige);border-radius:8px;font-family:Georgia,serif;font-size:14px;background:#fff;color:var(--brown);outline:none;-webkit-appearance:none;appearance:none}
#recDate::-webkit-date-and-time-value{text-align:left;font-family:Georgia,serif}
.btn-row{display:flex;gap:6px}
.btn{flex:1;padding:12px;border:none;border-radius:8px;font-family:Georgia,serif;font-size:14px;cursor:pointer}
.btn-primary{background:var(--vermillion);color:#fff}.btn-ghost{background:#fff;color:var(--brown);border:1px solid var(--brown)}
</style><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/></head><body><div id="app">
<header><h1 style="font-family:Georgia,serif;font-size:18px">너나들이</h1><div class="sub">내 사람과 나누는, 지도 위 기억 일기</div></header>
<main>
<section class="view active" id="view-map"><div id="map"></div><div class="search-wrap"><div class="search-box"><input id="search" placeholder="장소·건물·상호 검색"/></div><div class="sresults" id="sresults"></div></div><button id="locBtn" onclick="updateCurrentLocation()" title="현재 위치" style="position:absolute;bottom:20px;right:14px;width:48px;height:48px;border-radius:50%;background:#fff;border:1px solid var(--beige);box-shadow:0 2px 8px rgba(61,57,41,.18);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:400"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#D97757" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><circle cx="12" cy="12" r="9" stroke-dasharray="2 4"/></svg></button></section>
<section class="view" id="view-list"><div class="list-view"><div class="tabs"><button class="on" id="tabGo" onclick="switchTab('go')">간 곳</button><button id="tabWill" onclick="switchTab('will')">갈 곳</button></div><div id="goSection"><div class="cal" id="calBox"></div><div id="goCards"></div></div><div id="willSection" style="display:none"><div id="willCards"></div></div></div></section>
<section class="view" id="view-detail"><div class="detail-view"><button class="detail-back" onclick="closeDetail()">‹ 리스트로</button><div id="detailBody"></div></div></section>
<section class="view" id="view-my"><div class="my-view"><div class="profile-card"><div class="avatar" id="avatar" onclick="openAvatarModal()" style="background-size:cover;background-position:center;overflow:hidden"><svg id="avatarSvg" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5" style="width:60%;height:60%"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-7 8-7s8 3 8 7"/></svg></div><input type="file" id="avatarInp" accept="image/*" style="display:none" onchange="uploadAvatar(event)"/><div class="pinfo"><input class="pname-i" style="font-family:Georgia,serif;font-size:18px;border-bottom:1px dashed var(--beige);padding:2px 0" id="pname" value=""/><textarea class="pbio" id="pbio" placeholder="한 줄 소개" rows="1"></textarea><input class="pbio" id="pemail" type="email" placeholder="이메일 주소" style="font-family:Helvetica,sans-serif;font-size:11px;color:var(--terra);border-bottom:1px dashed var(--beige);padding:2px 0;margin-top:4px"/></div></div><div style="text-align:right;margin-bottom:16px" id="profileBtns"><button id="btnEdit" onclick="toggleEdit(true)" style="padding:6px 16px;border:1px solid var(--beige);background:#fff;color:var(--brown);border-radius:6px;font-family:Georgia,serif;font-size:12px;cursor:pointer">편집</button><button id="btnSave" onclick="toggleEdit(false)" style="padding:6px 16px;border:none;background:var(--vermillion);color:#fff;border-radius:6px;font-family:Georgia,serif;font-size:12px;cursor:pointer;display:none">저장</button></div><div class="stats" style="align-items:stretch"><div class="stat" style="position:relative"><div class="num" id="sAll">0</div><div class="lbl">전체</div><canvas id="donutChart" width="120" height="120" style="margin:8px auto 0;display:block"></canvas><div id="donutLegend" style="margin-top:6px;font-size:9px;display:flex;flex-direction:column;align-items:flex-start;gap:2px"></div></div><div class="stat"><div class="num" id="sGo">0</div><div class="lbl">간 곳</div></div><div class="stat"><div class="num" id="sWill">0</div><div class="lbl">갈 곳</div></div></div><div style="margin-bottom:18px;background:#fff;border:1px solid var(--beige);border-radius:10px;padding:16px"></div><div style="margin-bottom:18px;background:#fff;border:1px solid var(--beige);border-radius:10px;padding:16px"><div style="font-size:14px;margin-bottom:12px;color:var(--brown)">내 걸음</div><div id="miniLeaflet" style="width:100%;height:240px;border-radius:8px;background:var(--cream)"></div><div style="display:flex;gap:16px;justify-content:center;margin-top:10px;font-size:10px"><div style="display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:50%;background:#1D4ED8;display:inline-block"></span>간 곳</div><div style="display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:50%;background:#E63946;display:inline-block"></span>갈 곳</div></div></div><div class="menu-card"><div class="item" onclick="openInvite()">내 사람 초대<span class="arrow">›</span></div><div class="item" onclick="openFriendsList()">내 사람 목록<span id="friendsBadge" style="font-size:11px;color:var(--terra);margin-left:auto;margin-right:8px"></span><span class="arrow">›</span></div></div><div class="menu-card" id="loginBtnCard" style="display:none"><div class="item" onclick="document.getElementById('authModal').classList.add('on');loadRememberedEmails()" style="color:var(--vermillion);font-weight:bold">로그인 / 회원가입<span class="arrow">›</span></div></div><div class="menu-card" id="logoutBtnCard" style="margin-bottom:8px"><div class="item" onclick="doLogout()">로그아웃<span class="arrow">›</span></div></div><div id="loginStatusBar" style="text-align:center;font-size:10px;color:#8B7D6B;margin-bottom:16px;padding:6px;background:#fff;border:1px solid var(--beige);border-radius:6px"></div><div class="version" style="margin-top:16px">너나들이 v2.1.3</div></div></section>
</main>
<nav><button class="active" data-v="map"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C8 2 5 5 5 9c0 5 7 13 7 13s7-8 7-13c0-4-3-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg></button><button data-v="list"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg></button><button data-v="my"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-7 8-7s8 3 8 7"/></svg></button></nav>
</div>
<div class="sheet" id="sheet"><h3 style="font-family:Georgia,serif;font-size:16px;margin-bottom:4px">기록 작성</h3><div class="place" id="sPlace"></div>
<div class="cat-row"><button class="on-go" id="catGo" onclick="setCat('간 곳')">간 곳</button><button id="catWill" onclick="setCat('갈 곳')">갈 곳</button></div>
<div id="dateBox"><label style="font-size:11px;color:var(--terra);margin-bottom:5px;display:block">날짜</label><input type="date" id="recDate" class="form-input"/></div>
<div class="photo-slots" id="photoBox" onclick="document.getElementById('photoInp').click()"><div class="photo-slot" id="ps0"><span>+</span></div><div class="photo-slot" id="ps1"><span>+</span></div><div class="photo-slot" id="ps2"><span>+</span></div><div class="photo-slot" id="ps3"><span>+</span></div><div class="photo-slot" id="ps4"><span>+</span></div><div class="photo-slot" id="ps5"><span>+</span></div></div>
<input type="file" id="photoInp" accept="image/*" multiple style="display:none" onchange="pickPhotos(event)"/>
<input type="text" id="recTitle" class="form-input" placeholder="제목"/>
<textarea id="memo" class="form-input" placeholder="한 줄 기록" style="min-height:70px;resize:none"></textarea>
<div class="btn-row"><button class="btn btn-ghost" onclick="cancelForm()">취소</button><button class="btn btn-primary" onclick="saveRecord()">저장</button></div>
</div>
<div class="modal" id="dayModal"><div class="modal-inner"><h3 id="modalTitle"></h3><div id="modalBody"></div><button class="btn btn-primary" style="margin-top:10px;width:100%" onclick="document.getElementById('dayModal').classList.remove('on')">닫기</button></div></div>
<div class="modal" id="avatarModal"><div class="modal-inner" style="max-width:360px;text-align:center"><div id="avatarPreview" style="width:200px;height:200px;border-radius:50%;background:var(--vermillion);margin:0 auto 20px;overflow:hidden;display:flex;align-items:center;justify-content:center;background-size:cover;background-position:center"><svg id="avatarPreviewSvg" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5" style="width:50%;height:50%"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-7 8-7s8 3 8 7"/></svg></div><div class="btn-row" style="margin-bottom:8px"><button class="btn btn-ghost" onclick="_pendingAvatar=null;document.getElementById('avatarModal').classList.remove('on')">닫기</button><button id="btnChangeAvatar" class="btn btn-primary" onclick="document.getElementById('avatarInp').click()">사진 변경</button><button id="btnSaveAvatar" class="btn btn-primary" onclick="saveAvatar()" style="display:none">저장</button></div></div></div><!-- 초대 모달 -->
<div class="modal" id="inviteModal"><div class="modal-inner" style="max-width:420px">
  <h3 style="font-family:Georgia,serif;margin-bottom:16px">내 사람 초대</h3>
  <div style="margin-bottom:12px"><label style="font-size:11px;color:var(--terra);display:block;margin-bottom:4px">받는 사람</label><input id="invTo" type="email" placeholder="이메일 주소" style="width:100%;padding:10px;border:1px solid var(--beige);border-radius:8px;font-size:13px;outline:none;background:#fff;color:var(--brown)"/></div>
  <div style="margin-bottom:12px"><label style="font-size:11px;color:var(--terra);display:block;margin-bottom:4px">보내는 사람</label><div id="invFrom" style="padding:10px;border:1px solid var(--beige);border-radius:8px;font-size:13px;background:var(--cream);color:var(--brown);opacity:.7"></div></div>
  <div style="margin-bottom:14px;padding:12px;background:var(--cream);border:1px solid var(--beige);border-radius:8px;font-size:12px;color:var(--brown);line-height:1.6">
    <div id="invMsgPreview" style="white-space:pre-line"></div>
  </div>
  <div class="btn-row"><button class="btn btn-ghost" onclick="document.getElementById('inviteModal').classList.remove('on')">취소</button><button class="btn btn-primary" onclick="sendInvite()">이메일로 초대</button></div>
  <button onclick="sendKakaoInvite()" style="width:100%;margin-top:8px;padding:11px;background:#FEE500;color:#3D1D1D;border:none;border-radius:8px;font-family:Georgia,serif;font-size:14px;cursor:pointer;font-weight:bold">카카오톡으로 초대</button>
</div></div>

<!-- 내 사람 목록 모달 -->
<div class="modal" id="friendsModal"><div class="modal-inner" style="max-width:420px;max-height:80vh;overflow-y:auto">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <h3 style="font-family:Georgia,serif;margin:0">내 사람 목록</h3>
    <button onclick="document.getElementById('friendsModal').classList.remove('on')" style="border:none;background:transparent;font-size:22px;color:#8B7D6B;cursor:pointer;padding:0 2px;line-height:1">×</button>
  </div>
  <div id="friendsCount" style="font-size:11px;color:var(--terra);margin-bottom:12px"></div>
  <div id="friendsList" style="margin-bottom:14px"></div>
  <button onclick="document.getElementById('friendsModal').classList.remove('on');openInvite()" style="width:100%;padding:12px;background:var(--vermillion);color:#fff;border:none;border-radius:8px;font-family:Georgia,serif;font-size:14px;cursor:pointer">새 사람 초대하기</button>
</div></div>

function syncToSupabase(){
  clearTimeout(syncTimer);
  syncTimer=setTimeout(async function(){
    if(!currentUser||!sb)return;
    if(syncInProgress)return;
    syncInProgress=true;
    try{
      var toInsert=[],toUpdate=[];
      records.forEach(function(x,idx){
        var row={
          user_id:currentUser.id,cat:x.cat,name:x.name,title:x.title||'',
          addr:x.addr||'',region:x.region||'',memo:x.memo||'',
          lat:x.ll[0],lng:x.ll[1],
          photos:x.photos?x.photos.filter(function(p){return p}):[],
          record_date:x.date||'',record_ts:x.ts||0
        };
        if(x.sbId){row.id=x.sbId;toUpdate.push({row:row,idx:idx})}
        else toInsert.push({row:row,idx:idx});
      });
      if(toInsert.length){
        var insRes=await sb.from('records').insert(toInsert.map(function(t){return t.row})).select();
        if(insRes.error){console.warn('insert error:',insRes.error);return}
        if(insRes.data){
          insRes.data.forEach(function(row,i){
            var localIdx=toInsert[i].idx;
            if(records[localIdx])records[localIdx].sbId=row.id;
          });
          // sbId 즉시 localStorage에 저장 (중복 INSERT 방지)
          try{
            var clean=records.map(function(x){var o=Object.assign({},x);delete o._mk;return o});

        var u=toUpdate[i];
        var updRes=await sb.from('records').update(u.row).eq('id',u.row.id);
        if(updRes.error)console.warn('update error:',updRes.error);
      }
    }catch(e){console.warn('syncToSupabase error:',e)}
    finally{syncInProgress=false}
  },1500);
}

// ─── 좌표·장소 유틸 (v2.1 보강) ─────────────────────────────────
function distM(lat1,lng1,lat2,lng2){
  var R=6371000,toRad=Math.PI/180;
  var dLat=(lat2-lat1)*toRad,dLng=(lng2-lng1)*toRad;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*toRad)*Math.cos(lat2*toRad)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return 2*R*Math.asin(Math.sqrt(a));
}
function isSamePlace(a,b){
  if(!a||!b||!a.ll||!b.ll)return false;
  if((a.name||'').trim()!==(b.name||'').trim())return false;
  return distM(a.ll[0],a.ll[1],b.ll[0],b.ll[1])<=50;
}
function findSamePlaceRecs(target,includeWill){

function groupRecsByPlace(recs){

  return groups;
}

function compressImage(file){return new Promise(function(res){
  var rd=new FileReader();
  rd.onload=function(ev){
    var img=new Image();
    img.onload=function(){
      var max=900;
      var w=img.width,h=img.height;
      if(w>max||h>max){if(w>h){h=h*max/w;w=max}else{w=w*max/h;h=max}}
      var cv=document.createElement('canvas');
      cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      res(cv.toDataURL('image/jpeg',0.6));
    };
    img.src=ev.target.result;
  };
  rd.readAsDataURL(file);
})}

function normCity(region){
  if(!region)return '기타';
  var parts=region.split(' ').filter(function(x){return x&&!/^\d/.test(x)&&x.length>1});
  if(!parts.length)return '기타';
  var first=parts[0];
  // 약칭 -> 정식명 변환
  var shortMap={'서울':'서울특별시','부산':'부산광역시','대구':'대구광역시','인천':'인천광역시','광주':'광주광역시','대전':'대전광역시','울산':'울산광역시','세종':'세종특별자치시'};
  if(shortMap[first])first=shortMap[first];
  // 특별시/광역시/특별자치시는 그대로 반환 (산하 구·군 무시)
  if(/특별시$|광역시$|특별자치시$/.test(first))return first;
  // 도/특별자치도면 두 번째 단어가 시/군이어야 시 단위
  if(/도$|특별자치도$/.test(first)){
    if(parts[1]&&/시$|군$/.test(parts[1]))return parts[1];
    return '기타';
  }
  return '기타';
}

function openInvite(){

async function sendInvite(){
  var to=document.getElementById('invTo').value.trim();
  if(!to){toast('받는 사람 이메일을 입력해주세요');return}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(to)){toast('올바른 이메일 형식이 아닙니다');return}
  // 친구 목록에 추가 (Supabase)
  await addFriend(to);
  // 메일 클라이언트 열기
  var subj=encodeURIComponent('너나들이에 초대합니다');
  var body=encodeURIComponent(buildInviteMessage());
  window.location.href='mailto:'+to+'?subject='+subj+'&body='+body;
  document.getElementById('inviteModal').classList.remove('on');
  toast('초대 메일을 발송했습니다');
}

async function sendKakaoInvite(){
  if(typeof Kakao==='undefined'||!Kakao.isInitialized()){toast('카카오 SDK 로드 실패');return}
  var to=document.getElementById('invTo').value.trim();
  // 카카오톡은 이메일 입력이 없어도 OK (공유 시 받는 사람이 카톡에서 선택)
  if(to&&!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(to)){toast('올바른 이메일 형식이 아닙니다');return}
  if(to)await addFriend(to);
  try{
    // text 타입으로 메시지 전체 표시 (메일과 동일 포맷)
    Kakao.Share.sendDefault({
      objectType:'text',
      text:buildInviteMessage(),
      link:{mobileWebUrl:NND_APP_URL,webUrl:NND_APP_URL},
      buttonTitle:'바로 방문하기'
    });
    document.getElementById('inviteModal').classList.remove('on');
    toast('카카오톡으로 공유했습니다');
  }catch(e){
    console.warn('Kakao share failed',e);

  }
}

// ─── 친구 관리 ─────────────────────────────────────────────────
async function addFriend(email){
  if(!currentUser||!sb)return;
  try{
    var inviterName=(profile&&profile.name)||currentUser.email||'';
    // 초대 대상이 가입자인지 조회 (가입자라면 friend_user_id 매핑)
    var friendUid=null;
    try{
      var pr=await sb.from('profiles').select('id').eq('email',email).maybeSingle();
      if(pr&&pr.data&&pr.data.id)friendUid=pr.data.id;
    }catch(e){}
    var row={user_id:currentUser.id,friend_email:email,status:'pending',inviter_name:inviterName};
    if(friendUid)row.friend_user_id=friendUid;
    var res=await sb.from('friends').upsert(row,{onConflict:'user_id,friend_email'});
    if(res.error)console.warn('addFriend',res.error);
  }catch(e){console.warn('addFriend',e)}
}

async function loadFriends(){
  if(!currentUser||!sb)return [];
  try{
    // 내가 보낸 초대 (수락됨/대기 모두)
    var sent=await sb.from('friends').select('*').eq('user_id',currentUser.id).order('created_at',{ascending:false});
    // 내가 받은 초대 (RLS friends_select_received 정책으로 가능)
    var received=await sb.from('friends').select('*').eq('friend_user_id',currentUser.id).order('created_at',{ascending:false});
    var sentRows=(sent.data||[]).map(function(r){r._dir='sent';return r});
    var recvRows=(received.data||[]).map(function(r){r._dir='received';return r});
    return sentRows.concat(recvRows);
  }catch(e){console.warn('loadFriends',e);return []}
}

// 24시간 이내 새 항목 판정용
function isFresh(ts){
  if(!ts)return false;
  var t=new Date(ts).getTime();
  return Date.now()-t<24*60*60*1000;
}

async function acceptInvite(id){
  if(!currentUser||!sb)return;
  try{
    var res=await sb.from('friends').update({status:'accepted'}).eq('id',id).eq('friend_user_id',currentUser.id);
    if(res.error){console.warn('acceptInvite',res.error);toast('수락 실패');return}
    toast('수락되었습니다');
    openFriendsList();
    updateFriendsBadge();
  }catch(e){console.warn('acceptInvite',e)}
}

async function rejectInvite(id){
  if(!currentUser||!sb)return;
  var ok=await customConfirm('초대 거절','이 초대를 거절하시겠습니까?');
  if(!ok)return;
  try{
    // 거절은 status를 rejected로 표시하거나, row 자체 삭제. 여기선 status 변경
    var res=await sb.from('friends').update({status:'rejected'}).eq('id',id).eq('friend_user_id',currentUser.id);
    if(res.error){console.warn('rejectInvite',res.error);toast('거절 실패');return}
    toast('거절되었습니다');
    openFriendsList();
    updateFriendsBadge();
  }catch(e){console.warn('rejectInvite',e)}
}

async function removeFriend(id){
  if(!currentUser||!sb)return;
  var ok=await customConfirm('친구 삭제','이 사람을 내 사람 목록에서 제외하시겠습니까?');
  if(!ok)return;
  try{
    await sb.from('friends').delete().eq('id',id);
    openFriendsList(); // 목록 갱신
    toast('삭제되었습니다');
  }catch(e){console.warn('removeFriend',e)}
}

async function openFriendsList(){
  if(!currentUser){toast('로그인 후 이용할 수 있습니다');return}
  clearUnread();
  var modal=document.getElementById('friendsModal');
  document.getElementById('friendsList').innerHTML='<div style="text-align:center;padding:30px;color:#8B7D6B;font-size:12px">불러오는 중...</div>';
  modal.classList.add('on');
  var friends=await loadFriends();

  // 분류
  var receivedPending=friends.filter(function(f){return f._dir==='received'&&f.status==='pending'});
  var sentList=friends.filter(function(f){return f._dir==='sent'&&f.status!=='rejected'});
  var receivedAccepted=friends.filter(function(f){return f._dir==='received'&&f.status==='accepted'});
  // 친구 목록(수락된 관계): 보낸 수락 + 받은 수락
  var allFriends=sentList.concat(receivedAccepted);

  var pendingCount=sentList.filter(function(f){return f.status==='pending'}).length;
  var acceptedCount=allFriends.filter(function(f){return f.status==='accepted'}).length;
  var totalDisplay=allFriends.length;
  var countText='총 '+totalDisplay+'명 (수락 '+acceptedCount+' · 대기 '+pendingCount+')';
  if(receivedPending.length)countText+=' · 받은 초대 '+receivedPending.length;
  document.getElementById('friendsCount').textContent=countText;

  if(!friends.length){
    document.getElementById('friendsList').innerHTML='<div style="text-align:center;padding:30px;color:#8B7D6B;font-size:13px;line-height:1.6">아직 초대한 사람이 없습니다.<br/>새 사람을 초대해보세요.</div>';
    return;
  }

  var html='';

  // 받은 초대 섹션 (있을 때만)
  if(receivedPending.length){
    html+='<div style="font-size:11px;color:var(--terra);margin:4px 0 8px;font-family:Georgia,serif">받은 초대 ('+receivedPending.length+')</div>';
    html+=receivedPending.map(function(f){
      var displayName=f.inviter_name||f.friend_email||'';
      return '<div style="padding:12px;background:#FFF8F3;border:1px solid var(--vermillion);border-radius:8px;margin-bottom:6px">'
        +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
          +'<div style="flex:1;min-width:0">'
            +'<div style="font-family:Georgia,serif;font-size:14px;color:var(--brown);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis">'+displayName+'</div>'
            +'<div style="font-size:10px;color:#8B7D6B">내 사람으로 초대했습니다</div>'
          +'</div>'
        +'</div>'
        +'<div style="display:flex;gap:6px">'
          +'<button onclick="acceptInvite(\''+f.id+'\')" style="flex:1;padding:8px;background:var(--vermillion);color:#fff;border:none;border-radius:6px;font-family:Georgia,serif;font-size:12px;cursor:pointer">수락</button>'
          +'<button onclick="rejectInvite(\''+f.id+'\')" style="flex:1;padding:8px;background:#fff;color:var(--brown);border:1px solid var(--beige);border-radius:6px;font-family:Georgia,serif;font-size:12px;cursor:pointer">거절</button>'
        +'</div>'
      +'</div>';
    }).join('');
    html+='<div style="height:8px"></div>';
  }

  // 내 사람 목록 섹션
  if(allFriends.length){
    if(receivedPending.length){
      html+='<div style="font-size:11px;color:var(--terra);margin:4px 0 8px;font-family:Georgia,serif">내 사람</div>';
    }
    // 정렬: 신선한(24h) 항목이 위로, 그다음 created_at 내림차순
    allFriends.sort(function(a,b){
      var fa=isFresh(a.status==='accepted'?(a.updated_at||a.created_at):a.created_at);
      var fb=isFresh(b.status==='accepted'?(b.updated_at||b.created_at):b.created_at);
      if(fa&&!fb)return -1;
      if(!fa&&fb)return 1;
      return new Date(b.created_at).getTime()-new Date(a.created_at).getTime();
    });
    html+=allFriends.map(function(f){
      var statusBadge;
      var freshAccept=f.status==='accepted'&&isFresh(f.updated_at||f.created_at);
      var freshSentPending=f._dir==='sent'&&f.status==='pending'&&isFresh(f.created_at);
      if(freshAccept){
        statusBadge='<span style="font-size:10px;color:#fff;background:var(--vermillion);padding:2px 8px;border-radius:10px;font-family:Georgia,serif">방금 수락됨</span>';
      }else if(f.status==='accepted'){
        statusBadge='<span style="font-size:10px;color:#4AADA8;background:#EBF9F8;padding:2px 8px;border-radius:10px">수락됨</span>';
      }else if(freshSentPending){
        statusBadge='<span style="font-size:10px;color:var(--terra);background:#FFF0EB;padding:2px 8px;border-radius:10px">답장 대기</span>';
      }else{
        statusBadge='<span style="font-size:10px;color:var(--terra);background:#FFF0EB;padding:2px 8px;border-radius:10px">대기중</span>';
      }
      // 표시 이름: 내가 보낸 초대면 friend_name 또는 friend_email, 받은 수락이면 inviter_name
      var displayName,subEmail;
      if(f._dir==='received'){
        displayName=f.inviter_name||f.friend_email||'';
        subEmail=f.friend_email||'';
      }else{
        displayName=f.friend_name||f.friend_email||'';
        subEmail=f.friend_email||'';
      }
      return '<div style="display:flex;justify-content:space-between;align-items:center;padding:12px;background:#fff;border:1px solid var(--beige);border-radius:8px;margin-bottom:6px">'
        +'<div style="flex:1;min-width:0">'
          +'<div style="font-family:Georgia,serif;font-size:14px;color:var(--brown);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis">'+displayName+'</div>'
          +'<div style="font-size:10px;color:#8B7D6B;overflow:hidden;text-overflow:ellipsis">'+subEmail+'</div>'
        +'</div>'
        +'<div style="display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:8px">'
          +statusBadge
          +(f._dir==='sent'?'<button onclick="removeFriend(\''+f.id+'\')" style="border:none;background:transparent;color:var(--terra);font-size:18px;cursor:pointer;padding:0 4px;line-height:1">×</button>':'')
        +'</div></div>';
    }).join('');
  }

  document.getElementById('friendsList').innerHTML=html;
}

async function updateFriendsBadge(){
  var badge=document.getElementById('friendsBadge');
  if(!badge||!currentUser){if(badge)badge.textContent='';return}
  var friends=await loadFriends();
  var receivedPending=friends.filter(function(f){return f._dir==='received'&&f.status==='pending'}).length;
  var visible=friends.filter(function(f){return f.status!=='rejected'}).length;
  if(receivedPending){
    badge.innerHTML='<span style="color:var(--vermillion);font-weight:bold">+'+receivedPending+'</span> '+visible;
  }else if(visible){
    badge.textContent=visible;
  }else{
    badge.textContent='';
  }
}

function switchAuthTab(mode){
  var isLogin=mode==='login';
  document.getElementById('tabLoginBtn').style.background=isLogin?'var(--vermillion)':'#fff';
  document.getElementById('tabLoginBtn').style.color=isLogin?'#fff':'var(--brown)';
  document.getElementById('tabSignupBtn').style.background=isLogin?'#fff':'var(--vermillion)';
  document.getElementById('tabSignupBtn').style.color=isLogin?'var(--brown)':'#fff';
  document.getElementById('authSubmitBtn').textContent=isLogin?'로그인':'회원가입';
  document.getElementById('authSubmitBtn').onclick=isLogin?doLogin:doSignup;
  hideAuthError();
}
function closeAuthModal(){document.getElementById('authModal').classList.remove('on')}
function showAuthError(msg){var el=document.getElementById('authError');el.textContent=msg;el.style.display='block'}
function hideAuthError(){document.getElementById('authError').style.display='none'}
function clearMapMarkers(){
  records.forEach(function(r){if(r._mk){try{r._mk.setMap(null)}catch(e){}}});
  if(typeof tempMarker!=='undefined'&&tempMarker){try{tempMarker.setMap(null)}catch(e){}tempMarker=null}

}
function updateLoginUI(){

async function doLogin(){
  hideAuthError();if(!sb){showAuthError('Supabase 연결 실패');return}
  var email=document.getElementById('authEmail').value.trim();
  var pw=document.getElementById('authPassword').value;
  if(!email||!pw){showAuthError('이메일과 비밀번호를 입력해주세요');return}
  var btn=document.getElementById('authSubmitBtn');btn.textContent='로그인 중...';btn.disabled=true;
  var res=await sb.auth.signInWithPassword({email:email,password:pw});
  btn.textContent='로그인';btn.disabled=false;
  if(res.error){showAuthError('로그인 실패: '+res.error.message);return}
  onAuthSuccess(res.data.user);
}
async function doSignup(){
  hideAuthError();if(!sb){showAuthError('Supabase 연결 실패');return}
  var email=document.getElementById('authEmail').value.trim();
  var pw=document.getElementById('authPassword').value;
  if(!email||!pw){showAuthError('이메일과 비밀번호를 입력해주세요');return}
  if(pw.length<6){showAuthError('비밀번호는 6자 이상이어야 합니다');return}
  var btn=document.getElementById('authSubmitBtn');btn.textContent='가입 중...';btn.disabled=true;
  var res=await sb.auth.signUp({email:email,password:pw});
  btn.textContent='회원가입';btn.disabled=false;
  if(res.error){showAuthError('회원가입 실패: '+res.error.message);return}
  if(res.data.session){onAuthSuccess(res.data.user);return}
  showAuthError('가입 확인 이메일을 발송했습니다. 받은 편지함을 확인해주세요.');
}
async function doKakaoLogin(){
  hideAuthError();if(!sb){showAuthError('Supabase 연결 실패');return}
  var res=await sb.auth.signInWithOAuth({provider:'kakao',options:{redirectTo:'https://mrleegreatlee-ctrl.github.io/neonadeuri/'}});
  if(res.error){showAuthError('카카오 로그인 실패: '+res.error.message)}
}
async function doLogout(){
  var ok=await customConfirm('로그아웃','로그아웃하시겠습니까?');
  if(!ok)return;
  if(!sb)return;
  stopRealtime();
  setUnread(0);
  await sb.auth.signOut();
  currentUser=null;
  clearMapMarkers();
  records=[];profile={name:'',bio:'',email:'',avatarImg:''};
  localStorage.removeItem('nnd_records');localStorage.removeItem('nnd_profile');
  document.getElementById('pname').value='';document.getElementById('pbio').value='';document.getElementById('pemail').value='';
  document.getElementById('avatar').style.backgroundImage='';
  if(document.getElementById('avatarSvg'))document.getElementById('avatarSvg').style.display='block';
  renderAll();updateLoginUI();
  document.getElementById('authModal').classList.add('on');
  loadRememberedEmails();
  toast('로그아웃되었습니다');
}
async function onAuthSuccess(user){
  currentUser=user;
  rememberEmail(user.email);
  closeAuthModal();
  toast('로그인 되었습니다');
  clearMapMarkers();
  await loadFromSupabase();
  renderAll();
  records.forEach(plotRecord);
  updateLoginUI();
  updateFriendsBadge();
  startRealtime();
  renderUnreadDot();
}
async function loadFromSupabase(){
  if(!currentUser||!sb)return;
  try{
    var pRes=await sb.from('profiles').select('*').eq('id',currentUser.id).maybeSingle();
    if(pRes.data){
      profile.name=pRes.data.name||'';profile.bio=pRes.data.bio||'';
      profile.email=pRes.data.email||currentUser.email||'';profile.avatarImg=pRes.data.avatar_img||'';
    }else{
      profile.email=currentUser.email||'';profile.name=currentUser.email.split('@')[0]||'';profile.bio='';profile.avatarImg='';
    }
    localStorage.setItem('nnd_profile',JSON.stringify(profile));
    document.getElementById('pname').value=profile.name;document.getElementById('pbio').value=profile.bio;document.getElementById('pemail').value=profile.email;
    if(profile.avatarImg){document.getElementById('avatar').style.backgroundImage='url('+profile.avatarImg+')';if(document.getElementById('avatarSvg'))document.getElementById('avatarSvg').style.display='none'}
    var rRes=await sb.from('records').select('*').eq('user_id',currentUser.id).order('record_ts',{ascending:false});
    if(rRes.data){
      records=rRes.data.map(function(row){return{sbId:row.id,cat:row.cat,name:row.name,title:row.title||'',addr:row.addr||'',region:row.region||'',memo:row.memo||'',ll:[row.lat,row.lng],photos:row.photos||[],date:row.record_date||'',ts:row.record_ts||0}});
      localStorage.setItem('nnd_records',JSON.stringify(records));
    }
  }catch(e){console.warn('loadFromSupabase failed',e)}
}

function loadRememberedEmails(){
  try{
    var saved=JSON.parse(localStorage.getItem('nnd_remembered_emails')||'[]');
    var box=document.getElementById('rememberedEmails');
    if(!box||!saved.length){if(box)box.style.display='none';return}
    box.style.display='block';
    box.innerHTML=saved.slice(0,3).map(function(em){
      return '<div onclick="document.getElementById(\'authEmail\').value=\''+em+'\';document.getElementById(\'authPassword\').focus()" style="display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:#fff;border:1px solid var(--beige);border-radius:6px;font-size:11px;color:var(--brown);cursor:pointer;margin-bottom:4px">'
        +'<span>'+em+'</span>'
        +'<span onclick="event.stopPropagation();removeRememberedEmail(\''+em+'\')" style="color:#C96342;font-size:14px;padding:0 4px">×</span>'
      +'</div>';
    }).join('');
  }catch(e){}
}
function rememberEmail(em){
  if(!em)return;
  try{
    var saved=JSON.parse(localStorage.getItem('nnd_remembered_emails')||'[]');
    saved=saved.filter(function(x){return x!==em});
    saved.unshift(em);
    saved=saved.slice(0,3);
    localStorage.setItem('nnd_remembered_emails',JSON.stringify(saved));
  }catch(e){}
}
function removeRememberedEmail(em){
  try{
    var saved=JSON.parse(localStorage.getItem('nnd_remembered_emails')||'[]');
    saved=saved.filter(function(x){return x!==em});
    localStorage.setItem('nnd_remembered_emails',JSON.stringify(saved));
    loadRememberedEmails();
  }catch(e){}
}


// ── 사진 라이트박스 ─────────────────────────────────────────────
function openLightbox(idx){
  if(!window._lbPhotos||!window._lbPhotos.length)return;
  window._lbIdx=idx||0;
  updateLightbox();
  document.getElementById('photoLightbox').style.display='flex';
}
function closeLightbox(e){
  if(e&&e.target&&e.target.tagName==='IMG')return; // 이미지 자체 클릭은 닫지 않음
  document.getElementById('photoLightbox').style.display='none';
}
function updateLightbox(){
  var photos=window._lbPhotos||[];
  if(!photos.length)return;
  document.getElementById('lightboxImg').src=photos[window._lbIdx];
  document.getElementById('lightboxCounter').textContent=(window._lbIdx+1)+' / '+photos.length;
  document.getElementById('lbPrev').style.display=photos.length>1?'block':'none';
  document.getElementById('lbNext').style.display=photos.length>1?'block':'none';
}
function lightboxPrev(e){
  if(e)e.stopPropagation();
  var photos=window._lbPhotos||[];
  if(!photos.length)return;
  window._lbIdx=(window._lbIdx-1+photos.length)%photos.length;
  updateLightbox();
}
function lightboxNext(e){
  if(e)e.stopPropagation();
  var photos=window._lbPhotos||[];
  if(!photos.length)return;
  window._lbIdx=(window._lbIdx+1)%photos.length;
  updateLightbox();
}
// 키보드 화살표 지원
document.addEventListener('keydown',function(e){
  if(document.getElementById('photoLightbox').style.display!=='flex')return;
  if(e.key==='Escape')closeLightbox();
  else if(e.key==='ArrowLeft')lightboxPrev();
  else if(e.key==='ArrowRight')lightboxNext();
});
// 스와이프 지원 (모바일)
(function(){
  var startX=0,startY=0;
  var lb=document.getElementById('photoLightbox');
  if(!lb)return;
  lb.addEventListener('touchstart',function(e){startX=e.touches[0].clientX;startY=e.touches[0].clientY},{passive:true});
  lb.addEventListener('touchend',function(e){
    var dx=e.changedTouches[0].clientX-startX;
    var dy=e.changedTouches[0].clientY-startY;
    if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)){
      if(dx>0)lightboxPrev();else lightboxNext();
    }
  },{passive:true});
})();

function customConfirm(title,msg){
  return new Promise(function(resolve){
    document.getElementById('confirmTitle').textContent=title||'';
    document.getElementById('confirmMsg').textContent=msg||'';
    var modal=document.getElementById('confirmModal');
    var ok=document.getElementById('confirmOk');
    var cancel=document.getElementById('confirmCancel');
    function close(result){
      modal.classList.remove('on');
      ok.onclick=null;cancel.onclick=null;
      resolve(result);
    }
    ok.onclick=function(){close(true)};
    cancel.onclick=function(){close(false)};
    modal.classList.add('on');
  });
}
// ─── Realtime 알림 시스템 (v2.1 보강) ────────────────────────────
window._rtChannels=[];

function getUnread(){return parseInt(localStorage.getItem('nnd_unread_notif')||'0',10)}
function setUnread(n){localStorage.setItem('nnd_unread_notif',String(Math.max(0,n)));renderUnreadDot()}
function pushNotif(text){
  toast(text);
  setUnread(getUnread()+1);
}
function clearUnread(){setUnread(0)}
function renderUnreadDot(){
  var menu=document.querySelectorAll('#view-my .menu-card .item');
  // "내 사람 목록" 메뉴 항목에 빨간 점 표시
  menu.forEach(function(item){
    if(item.textContent.indexOf('내 사람 목록')<0)return;
    var existing=item.querySelector('.unread-dot');
    if(existing)existing.remove();
    if(getUnread()>0){
      var dot=document.createElement('span');
      dot.className='unread-dot';
      dot.style.cssText='display:inline-block;width:7px;height:7px;border-radius:50%;background:#E63946;margin-left:6px;flex-shrink:0';
      var arrow=item.querySelector('.arrow');
      if(arrow)item.insertBefore(dot,arrow);
    }
  });
}

function startRealtime(){
  if(!sb||!currentUser)return;
  stopRealtime();
  try{
    // (1) 내가 초대받음: friends에 friend_user_id=내 INSERT
    // (2) 친구가 내 초대 수락: user_id=내 + status='accepted' UPDATE
    var chFriends=sb.channel('rt-friends-'+currentUser.id)
      .on('postgres_changes',
        {event:'INSERT',schema:'public',table:'friends',filter:'friend_user_id=eq.'+currentUser.id},
        function(payload){
          var name=(payload.new&&(payload.new.inviter_name||payload.new.user_id))||'';
          pushNotif(name+'님이 당신을 내 사람으로 초대했습니다');
          updateFriendsBadge();
        })
      .on('postgres_changes',
        {event:'UPDATE',schema:'public',table:'friends',filter:'user_id=eq.'+currentUser.id},
        function(payload){
          if(payload.new&&payload.new.status==='accepted'&&(!payload.old||payload.old.status!=='accepted')){
            pushNotif((payload.new.friend_email||'')+'님이 초대를 수락했습니다');
            updateFriendsBadge();
          }
        })
      .subscribe();

    window._rtChannels=[chFriends];
  }catch(e){console.warn('startRealtime failed',e)}
}

function stopRealtime(){
  (window._rtChannels||[]).forEach(function(ch){
    try{if(sb)sb.removeChannel(ch)}catch(e){}
  });
  window._rtChannels=[];
}

// syncToSupabase 래퍼 제거됨 (records Realtime 미사용으로 불필요)

async function initAuth(){
  if(!sb){updateLoginUI();return}
  try{
    var sessionRes=await sb.auth.getSession();
    if(sessionRes.data&&sessionRes.data.session){
      currentUser=sessionRes.data.session.user;
      closeAuthModal();
      await loadFromSupabase();
      renderAll();
      records.forEach(plotRecord);
      startRealtime();
      renderUnreadDot();
    }else{
      // 비로그인 상태: 모든 프로필/기록 데이터 초기화
      records=[];profile={name:'',bio:'',email:'',avatarImg:''};
      localStorage.removeItem('nnd_records');localStorage.removeItem('nnd_profile');
      document.getElementById('pname').value='';document.getElementById('pbio').value='';document.getElementById('pemail').value='';
      document.getElementById('avatar').style.backgroundImage='';
      if(document.getElementById('avatarSvg'))document.getElementById('avatarSvg').style.display='block';
      renderAll();
      document.getElementById('authModal').classList.add('on');
      loadRememberedEmails();
    }
    updateLoginUI();
    sb.auth.onAuthStateChange(function(event,session){
      if(event==='SIGNED_IN'&&session&&!currentUser){
        currentUser=session.user;closeAuthModal();clearMapMarkers();
        loadFromSupabase().then(function(){renderAll();records.forEach(plotRecord);updateLoginUI();startRealtime();renderUnreadDot()});
      }else if(event==='SIGNED_OUT'){
        stopRealtime();
        currentUser=null;clearMapMarkers();records=[];renderAll();updateLoginUI();
        document.getElementById('authModal').classList.add('on');loadRememberedEmails();
      }
    });
  }catch(e){console.warn('initAuth failed',e);updateLoginUI()}
}
setTimeout(initAuth,100);
